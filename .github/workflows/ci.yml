name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_to_testpypi:
        description: "Publish the built distributions to TestPyPI"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ruff>=0.15.20"

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Check linting
        run: python -m ruff check .

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests with coverage
        run: >
          python -m pytest -q
          --cov=rapidfuzz_collections
          --cov-report=term-missing
          --cov-report=xml

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build package
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Check release tag matches project version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          python - <<'PY'
          import os
          import sys
          import tomllib
          from pathlib import Path

          version = tomllib.loads(
              Path("pyproject.toml").read_text(encoding="utf-8")
          )["project"]["version"]

          expected_tag = f"v{version}"
          actual_tag = os.environ["GITHUB_REF_NAME"]

          if actual_tag != expected_tag:
              print(
                  f"Release tag mismatch: expected {expected_tag!r}, got {actual_tag!r}",
                  file=sys.stderr,
              )
              sys.exit(1)
          PY

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Smoke test wheel install
        run: |
          WHEEL_URL=$(python -c "from pathlib import Path; print(next(Path('dist').glob('*.whl')).resolve().as_uri())")
          python -m venv /tmp/rapidfuzz-collections-base
          /tmp/rapidfuzz-collections-base/bin/python -m pip install --upgrade pip
          /tmp/rapidfuzz-collections-base/bin/python -m pip install "rapidfuzz-collections @ ${WHEEL_URL}"
          cd /tmp
          /tmp/rapidfuzz-collections-base/bin/python -c "from rapidfuzz_collections import FuzzyList; assert FuzzyList(['Alpha Phone']).fuzzy_get('Alpa Phone') == 'Alpha Phone'"

      - name: Smoke test cdist extra install
        run: |
          WHEEL_URL=$(python -c "from pathlib import Path; print(next(Path('dist').glob('*.whl')).resolve().as_uri())")
          python -m venv /tmp/rapidfuzz-collections-cdist
          /tmp/rapidfuzz-collections-cdist/bin/python -m pip install --upgrade pip
          /tmp/rapidfuzz-collections-cdist/bin/python -m pip install "rapidfuzz-collections[cdist] @ ${WHEEL_URL}"
          cd /tmp
          /tmp/rapidfuzz-collections-cdist/bin/python -c "from rapidfuzz_collections import FuzzyList; match = FuzzyList(['Alpha Phone']).fuzzy_find_one_batch_cdist(['Alpa Phone'])[0]; assert match is not None and match.value == 'Alpha Phone'"

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' && inputs.publish_to_testpypi)
      || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))

    environment:
      name: testpypi
      url: https://test.pypi.org/project/rapidfuzz-collections/

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-to-pypi:
    name: Publish to PyPI
    needs: publish-to-testpypi
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    environment:
      name: pypi
      url: https://pypi.org/project/rapidfuzz-collections/

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
