name: Bug report
description: Report a reproducible bug
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill in all required fields. Issues without enough information may be closed.

  - type: input
    id: package-version
    attributes:
      label: Package version
      description: "Output of: `pip show rapidfuzz-collections`"
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: "Output of: `python --version`"
      placeholder: "e.g. 3.14.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Windows 11, Ubuntu 24.04, macOS 15"
    validations:
      required: false

  - type: textarea
    id: reproduce
    attributes:
      label: Code to reproduce
      description: Minimal example that reproduces the issue.
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the full traceback if applicable.
    validations:
      required: true
